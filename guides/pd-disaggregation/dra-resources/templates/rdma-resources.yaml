{{- if and .Values.enabled .Values.rdmaDeviceClass.enabled }}
apiVersion: resource.k8s.io/v1
kind: DeviceClass
metadata:
  name: {{ .Values.rdmaDeviceClass.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: llm-d
    component: dra
    type: rdma
  annotations:
    description: {{ .Values.rdmaDeviceClass.description }}
spec:
  selectors:
  {{- range .Values.rdmaDeviceClass.selectors }}
    - cel:
        expression: {{ .expression | quote }}
  {{- end }}
---
{{- end }}
{{- if and .Values.enabled .Values.rdmaResourceClaimTemplate.enabled }}
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: {{ .Values.rdmaResourceClaimTemplate.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: llm-d
    component: dra
    type: rdma
  annotations:
    description: {{ .Values.rdmaResourceClaimTemplate.description }}
spec:
  spec:
    devices:
      requests:
        - name: rdma-net-interface
          exactly:
            deviceClassName: {{ .Values.rdmaDeviceClass.name }}
            count: 1
{{- end }}
