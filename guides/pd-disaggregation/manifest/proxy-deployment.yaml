apiVersion: apps/v1
kind: Deployment
metadata:
  name: toy-proxy
  namespace: llm-d-pd
  labels:
    app: toy-proxy
    role: proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: toy-proxy
  template:
    metadata:
      labels:
        app: toy-proxy
        role: proxy
    spec:
      containers:
      - name: proxy
        image: amr-registry.caas.intel.com/aiops/catalog/intel-vllm:0.14.1
        command:
        - /bin/bash
        - -c
        args:
        - |
          exec python3 /workspace/vllm/tests/v1/kv_connector/nixl_integration/toy_proxy_server.py \
            --prefiller-hosts vllm-prefill.llm-d-pd.svc.cluster.local \
            --prefiller-port 8000 \
            --decoder-host vllm-decode.llm-d-pd.svc.cluster.local \
            --decoder-port 8200 \
            --host 0.0.0.0 \
            --port 8085
        ports:
        - containerPort: 8085
          name: proxy
        resources:
          requests:
            memory: 2Gi
            cpu: "2"
          limits:
            memory: 4Gi
            cpu: "4"
        readinessProbe:
          tcpSocket:
            port: 8085
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: toy-proxy
  namespace: llm-d-pd
spec:
  selector:
    app: toy-proxy
  ports:
  - name: proxy
    port: 8085
    targetPort: 8085
