# Intel XPU configuration for PD Disaggregation with RDMA
# This configuration sets up prefill and decode services with Intel XPU optimization and ZE_AFFINITY_MASK

multinode: false

# Configure accelerator type for Intel XPU via DRA
accelerator:
  type: intel
  dra: true
  resourceClaimTemplates:
    intel:
      name: intel-claim-template
      class: gpu.intel.com
      match: "exactly"
      selectors: []
      rdmaNet:
        enabled: true
        name: intel-rdma-claim-template
        claimName: intel-rdma-claim
        requestName: rdma-dranet
        class: rdma-dranet
        match: "exactly"
        count: 1
        selectors:
          - cel:
              expression: "true"

modelArtifacts:
  uri: "hf://Qwen/Qwen3-0.6B"
  size: 10Gi  # Smaller model size for Intel XPU
  authSecretName: "llm-d-hf-token"
  name: "Qwen/Qwen3-0.6B"
  labels:
    llm-d.ai/inference-serving: "true"
    llm-d.ai/guide: "pd-disaggregation"
    llm-d.ai/hardware-variant: "xpu"
    llm-d.ai/hardware-vendor: "intel"
    llm-d.ai/model: "Qwen3-0.6B"

routing:
  servicePort: 8000
  proxy:
    image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.5.0
    connector: nixlv2
    secure: false

decode:
  parallelism:  # controls count of specialized hardware devices allocated
    tensor: 1
  create: true
  replicas: 1
  monitoring:
    podmonitor:
      enabled: true
      portName: "vllm"  # decode vLLM service port (from routing.proxy.targetPort)
      path: "/metrics"
      interval: "30s"
  containers:
    - name: "vllm"
      image: ghcr.io/llm-d/llm-d-xpu:v0.5.0
      modelCommand: custom
      command: ["/bin/bash", "-c"]
      args:
        - |
          export UCX_NET_DEVICES="$(rdma link | awk '/netdev/ { split($2,a,"/"); dev=a[1]":1"; if (list=="") list=dev; else list=list","dev } END { print list }')"
          exec vllm serve Qwen/Qwen3-0.6B \
            --port 8200 \
            --served-model-name "Qwen/Qwen3-0.6B" \
            --block-size 64 \
            --kv-transfer-config '{"kv_connector":"NixlConnector", "kv_role":"kv_both", "kv_buffer_device":"xpu"}' \
            --disable-log-requests \
            --disable-uvicorn-access-log \
            --max-model-len 32000 \
            --no-enable-prefix-caching
      securityContext:
        privileged: true
        runAsUser: 0
        runAsGroup: 0
        capabilities:
          add: ["IPC_LOCK","NET_ADMIN","SYS_PTRACE","SYS_ADMIN","SYS_RAWIO"]
      env:
        - name: UCX_TLS
          value: "ib,rc,ze_copy"
        - name: VLLM_NIXL_SIDE_CHANNEL_HOST
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: VLLM_NIXL_SIDE_CHANNEL_PORT
          value: "5600"
        # Intel XPU environment variables (required after switching to DRA)
        - name: VLLM_USE_V1
          value: "1"
        - name: TORCH_LLM_ALLREDUCE
          value: "1"
        - name: VLLM_WORKER_MULTIPROC_METHOD
          value: "spawn"
        - name: UCX_MEMTYPE_CACHE
          value: "0"
        - name: ZE_AFFINITY_MASK
          value: "3"
      ports:
        - containerPort: 8200
          name: vllm
          protocol: TCP
        - containerPort: 5600
          name: nixl
          protocol: TCP
      resources:
        limits:
          cpu: "4"
          memory: "8Gi"
          # note: XPU resources get controlled by parallelism + accelerators above
        requests:
          cpu: "4"
          memory: "8Gi"
          # note: XPU resources get controlled by parallelism + accelerators above
      mountModelVolume: true
      volumeMounts:
        - name: metrics-volume
          mountPath: /.config
        - name: shm
          mountPath: /dev/shm
        - name: torch-compile-cache
          mountPath: /.cache
        - name: driver
          mountPath: /dev/dri
      startupProbe:
        httpGet:
          path: /v1/models
          port: vllm
          httpHeaders:
            - name: Content-Type
              value: application/json
        initialDelaySeconds: 30
        periodSeconds: 30
        timeoutSeconds: 10
        failureThreshold: 60
      livenessProbe:
        httpGet:
          path: /health
          port: vllm
        periodSeconds: 30
        timeoutSeconds: 10
        failureThreshold: 20
      readinessProbe:
        httpGet:
          path: /v1/models
          port: vllm
          httpHeaders:
            - name: Content-Type
              value: application/json
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 6
  volumes:
    - name: metrics-volume
      emptyDir: {}
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: "16Gi"
    - name: torch-compile-cache
      emptyDir: {}
    - name: driver
      hostPath:
        path: /dev/dri
    
