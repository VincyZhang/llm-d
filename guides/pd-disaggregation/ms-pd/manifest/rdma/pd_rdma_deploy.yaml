# Source: llm-d-modelservice/templates/decode-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-pd-llm-d-modelservice-decode
  labels:
    helm.sh/chart: llm-d-modelservice-v0.4.6
    app.kubernetes.io/version: "v0.4.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      llm-d.ai/guide: pd-disaggregation
      llm-d.ai/hardware-variant: xpu
      llm-d.ai/hardware-vendor: intel
      llm-d.ai/inference-serving: "true"
      llm-d.ai/model: Qwen3-0.6B
      llm-d.ai/role: decode
  template:
    metadata:
      labels:
        llm-d.ai/guide: pd-disaggregation
        llm-d.ai/hardware-variant: xpu
        llm-d.ai/hardware-vendor: intel
        llm-d.ai/inference-serving: "true"
        llm-d.ai/model: Qwen3-0.6B
        llm-d.ai/role: decode
    spec:
      initContainers:
        - name: routing-proxy
          args:
            - --port=8000
            - --vllm-port=8200
            - --connector=nixlv2
            - --zap-encoder=json
            - --zap-log-level=debug
            - --secure-proxy=false
          image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.5.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources: {}
          restartPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
    
      serviceAccountName: ms-pd-llm-d-modelservice
      
      volumes:
        - emptyDir: {}
          name: metrics-volume
        - emptyDir:
            medium: Memory
            sizeLimit: 16Gi
          name: shm
        - emptyDir: {}
          name: torch-compile-cache
        - hostPath:
            path: /dev/dri
          name: driver
      
        - name: model-storage
          emptyDir:
            sizeLimit: 10Gi
        
      resourceClaims:
        - name: intel-decode-claim
          resourceClaimTemplateName: intel-claim-template-decode
      containers:
        - name: vllm
          image: amr-registry.caas.intel.com/aiops/catalog/intel-vllm:0.14.1
          securityContext:
            capabilities:
              add:
              - IPC_LOCK
              - NET_ADMIN
              - SYS_PTRACE
              - SYS_ADMIN
              - SYS_RAWIO
            privileged: true
            runAsGroup: 0
            runAsUser: 0
          
          command:
            - /bin/bash
            - -c
          args:
            - |
              export UCX_NET_DEVICES="$(rdma link | grep netdev | awk '{print $2}' | cut -d'/' -f1):1"
              exec vllm serve Qwen/Qwen3-0.6B \
                --port 8200 \
                --served-model-name "Qwen/Qwen3-0.6B" \
                --block-size 64 \
                --kv-transfer-config '{"kv_connector":"NixlConnector", "kv_role":"kv_both", "kv_buffer_device":"xpu"}' \
                --disable-log-requests \
                --disable-uvicorn-access-log \
                --max-model-len 32000 \
                --no-enable-prefix-caching
          env:
          - name: UCX_TLS
            value: ib,rc,ze_copy
          - name: VLLM_NIXL_SIDE_CHANNEL_HOST
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: VLLM_NIXL_SIDE_CHANNEL_PORT
            value: "5500"
          - name: VLLM_USE_V1
            value: "1"
          - name: TORCH_LLM_ALLREDUCE
            value: "1"
          - name: VLLM_WORKER_MULTIPROC_METHOD
            value: spawn
          - name: HTTP_PROXY
            value: http://proxy.ims.intel.com:911
          - name: HTTPS_PROXY
            value: http://proxy.ims.intel.com:911
          - name: http_proxy
            value: http://proxy.ims.intel.com:911
          - name: https_proxy
            value: http://proxy.ims.intel.com:911
          - name: NO_PROXY
            value: localhost,*intel.com,192.168.0.0/16,127.0.0.0/8,::1
          - name: no_proxy
            value: localhost,*intel.com,192.168.0.0/16,127.0.0.0/8,::1
          - name: VLLM_LOGGING_LEVEL
            value: DEBUG
          - name: UCX_MEMTYPE_CACHE
            value: "0"
          - name: NIXL_TELEMETRY_ENABLE
            value: "1"
          - name: ZE_AFFINITY_MASK
            value: "3"
          - name: DP_SIZE
            value: "1"
          - name: TP_SIZE
            value: "1"
          - name: DP_SIZE_LOCAL
            value: "1"
          
          - name: HF_HOME
            value: /model-cache
          - name: HF_TOKEN
            valueFrom:
              secretKeyRef:
                name: llm-d-hf-token
                key: HF_TOKEN
          
          ports:
          - containerPort: 8200
            name: vllm
            protocol: TCP
          - containerPort: 5500
            name: nixl
            protocol: TCP
          livenessProbe:
            failureThreshold: 20
            httpGet:
              path: /health
              port: vllm
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            failureThreshold: 6
            httpGet:
              httpHeaders:
              - name: Content-Type
                value: application/json
              path: /v1/models
              port: vllm
            periodSeconds: 10
            timeoutSeconds: 5
          startupProbe:
            failureThreshold: 60
            httpGet:
              httpHeaders:
              - name: Content-Type
                value: application/json
              path: /v1/models
              port: vllm
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          resources:
            limits:
              cpu: "16"
              memory: 64Gi
            requests:
              cpu: "16"
              memory: 64Gi
            claims:
              - name: intel-decode-claim
          
          volumeMounts:
            - mountPath: /.config
              name: metrics-volume
            - mountPath: /dev/shm
              name: shm
            - mountPath: /.cache
              name: torch-compile-cache
            - mountPath: /dev/dri
              name: driver
            - name: model-storage
              mountPath: /model-cache
